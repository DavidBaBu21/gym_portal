<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rutina</title>
</head>
<body>
  <h1>📋 Rutina de {{ dia_elegido|capitalize }}</h1>
  <h2>{{ rutina.nombre }}</h2>

  <!-- Formulario para elegir día -->
  <form method="POST">
    <label for="dia">Elige un día:</label>
    <select name="dia" id="dia">
      {% for d in dias %}
        <option value="{{ d }}" {% if d == dia_elegido %}selected{% endif %}>{{ d|capitalize }}</option>
      {% endfor %}
    </select>
    <button type="submit">Ver rutina</button>
  </form>

  <!-- Mostrar ejercicios asignados -->
  {% for er in rutina.ejercicios_rutina %}
    <p>{{ er.ejercicio.nombre }} - {{ er.series }}x{{ er.repeticiones }} (Descanso: {{ er.descanso }}s)</p>
  {% endfor %}
</body>
</html>
